<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" role="img" aria-labelledby="s1 s2">
  <title id="s1">Superpowers session workflow</title>
  <desc id="s2">User request through brainstorm, approval, planning, TDD, review, and deploy.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcf9ea"/>
      <stop offset="100%" stop-color="#f3efe0"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e4845"/>
      <stop offset="100%" stop-color="#3d7a75"/>
    </linearGradient>
    <linearGradient id="creamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f5f2e0"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9dd4cf"/>
      <stop offset="100%" stop-color="#badfdb"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f6ee"/>
    </linearGradient>
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1e4845" flood-opacity="0.1"/>
    </filter>
    <filter id="pillShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e4845" flood-opacity="0.1"/>
    </filter>
    <filter id="glowMint" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#9dd4cf" flood-opacity="0.55"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2a5c58"/>
    </marker>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#1e4845" opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="900" height="320" fill="url(#bgGrad)"/>
  <rect width="900" height="320" fill="url(#dots)"/>

  <g filter="url(#cardShadow)">
    <rect x="32" y="24" width="836" height="268" rx="18" fill="#fff" stroke="rgba(30,72,69,0.1)" stroke-width="1.5"/>
    <rect x="32" y="24" width="836" height="58" rx="18" fill="url(#tealGrad)"/>
    <rect x="32" y="58" width="836" height="24" fill="url(#tealGrad)"/>
  </g>
  <text x="56" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" fill="#fff">Session Workflow</text>
  <text x="56" y="68" font-family="Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.14em" fill="rgba(255,255,255,0.78)">USER REQUEST TO DEPLOY</text>

  <rect x="56" y="96" width="88" height="24" rx="12" fill="#eef4f3" stroke="#dde7e6"/>
  <text x="100" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="0.1em" fill="#2a5c58">DEFINE</text>
  <rect x="56" y="196" width="88" height="24" rx="12" fill="#eef4f3" stroke="#dde7e6"/>
  <text x="100" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="0.1em" fill="#2a5c58">EXECUTE</text>

  <g filter="url(#pillShadow)">
    <rect x="148" y="118" width="88" height="40" rx="20" fill="url(#pillGrad)" stroke="rgba(30,72,69,0.14)" stroke-width="1.2"/>
    <rect x="268" y="118" width="104" height="40" rx="20" fill="url(#creamGrad)" stroke="rgba(30,72,69,0.14)" stroke-width="1.2"/>
    <rect x="404" y="118" width="96" height="40" rx="20" fill="url(#creamGrad)" stroke="rgba(30,72,69,0.14)" stroke-width="1.2"/>
    <rect x="532" y="118" width="88" height="40" rx="20" fill="url(#creamGrad)" stroke="rgba(30,72,69,0.14)" stroke-width="1.2"/>
    <rect x="652" y="118" width="88" height="40" rx="20" fill="url(#creamGrad)" stroke="rgba(30,72,69,0.14)" stroke-width="1.2"/>
  </g>
  <text x="192" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1e4845">User</text>
  <text x="320" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1e4845">Brainstorm</text>
  <text x="452" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1e4845">Approve</text>
  <text x="576" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1e4845">Plan</text>
  <text x="696" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1e4845">Task</text>

  <path d="M238 138 H266" stroke="#2a5c58" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M374 138 H402" stroke="#2a5c58" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M502 138 H530" stroke="#2a5c58" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M622 138 H650" stroke="#2a5c58" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.7"/>

  <path d="M696 158 V176 H192 V218" stroke="#2a5c58" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.62"/>
  <rect x="678" y="160" width="36" height="18" rx="9" fill="#fff" stroke="rgba(30,72,69,0.14)"/>
  <text x="696" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" letter-spacing="0.06em" fill="#5a7a77">GATE</text>

  <g filter="url(#pillShadow)">
    <rect x="148" y="218" width="88" height="40" rx="20" fill="url(#creamGrad)" stroke="rgba(30,72,69,0.14)" stroke-width="1.2"/>
    <rect x="268" y="218" width="128" height="40" rx="20" fill="url(#creamGrad)" stroke="rgba(30,72,69,0.14)" stroke-width="1.2"/>
    <rect x="428" y="218" width="96" height="40" rx="20" fill="url(#creamGrad)" stroke="rgba(30,72,69,0.14)" stroke-width="1.2"/>
  </g>
  <g filter="url(#glowMint)">
    <rect x="556" y="218" width="96" height="40" rx="20" fill="url(#mintGrad)" stroke="#1e4845" stroke-width="1.2"/>
  </g>
  <text x="192" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1e4845">Test</text>
  <text x="332" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1e4845">Implementation</text>
  <text x="476" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1e4845">Review</text>
  <text x="604" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1e4845">Deploy</text>

  <path d="M238 238 H266" stroke="#2a5c58" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M398 238 H426" stroke="#2a5c58" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M526 238 H554" stroke="#2a5c58" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.7"/>
</svg>
